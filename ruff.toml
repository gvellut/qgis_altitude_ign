line-length = 88
target-version = "py311"

[lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # isort
    "I",
]
unfixable = ["F401"]

[lint.isort]
combine-as-imports = true
force-sort-within-sections = true
order-by-type = true
